version: '3.9'

services:

  db:
    image: mysql:8
    container_name: auth-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: auth_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    ports:
      - "8001:8000"
    volumes:
      - ./services/auth-service:/app
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=auth_db
      - DB_USER=root
      - DB_PASSWORD=password


  order-service:
    build: ./services/order-service
    container_name: order-service
    ports:
      - "8002:8000"
    volumes:
      - ./services/order-service:/app
    depends_on:
      - db
      - auth-service
    environment:
      - DB_HOST=db
      - DB_NAME=auth_db  # ضع اسم قاعدة البيانات التي يحتاجها
      - DB_USER=root
      - DB_PASSWORD=password
      - AUTH_SERVICE_URL=http://auth-service:8000  # إذا يحتاج الاتصال بخدمة المصادقة

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - auth-service
      - order-service

volumes:
  db_data: