version: '3.9'

services:

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    ports:
      - "8001:8000"
    volumes:
      - ./services/auth-service:/app
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=auth_db
      - DB_USER=root
      - DB_PASSWORD=password

  db:
    image: mysql:8
    container_name: auth-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: auth_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: